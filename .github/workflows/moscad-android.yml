name: moscad-android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install ndk
        run: |
          sdkmanager "ndk;26.3.11579264"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: install dependencies
        run: npm install --force

      - name: clean broken android folder
        run: rm -rf src-tauri/gen/android

      - name: create machine-uid stub
        run: |
          mkdir -p _patches/machine-uid/src
          echo '[package]' > _patches/machine-uid/Cargo.toml
          echo 'name = "machine-uid"' >> _patches/machine-uid/Cargo.toml
          echo 'version = "0.5.4"' >> _patches/machine-uid/Cargo.toml
          echo 'edition = "2021"' >> _patches/machine-uid/Cargo.toml
          echo 'pub fn get() -> Result<String, std::io::Error> { Ok("android".into()) }' > _patches/machine-uid/src/lib.rs
          if ! grep -q "patch.crates-io" src-tauri/Cargo.toml; then
            echo -e "\n[patch.crates-io]\nmachine-uid = { path = \"../_patches/machine-uid\" }" >> src-tauri/Cargo.toml
          fi

      - name: clean android project fully
        run: rm -rf src-tauri/gen/android
      - name: init android project
        run: npx tauri android init

      - name: create xml resources
        run: python3 scripts/create_xml_resources.py

      - name: patch android manifest
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<uses-permission android:name="android.permission.INTERNET"/a\    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
            sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
            sed -i '/<\/application>/i\        <service android:name=".ProxyService" android:foregroundServiceType="dataSync" android:exported="false" />' "$MANIFEST"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Build Go sidecar for Android
        run: |
          cd sidecar-utls
          GOOS=linux GOARCH=arm64 go build -o ../src-tauri/binaries/sidecar-aarch64-linux-android
          file ../src-tauri/binaries/sidecar-aarch64-linux-android

      - name: build frontend explicitly
        run: npx vite build && ls -la dist/

      - name: copy dist to tauri
        run: |
          ls -la dist/
          cp -r dist src-tauri/../dist || true
          echo "=== dist copied ==="

      - name: build android
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          echo "=== dist contents ==="
          ls -la dist/
          echo "=== sidecar ==="
          ls -la src-tauri/binaries/
          npx tauri android build --target aarch64
          echo "=== APK assets after build ==="
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          unzip -l "$APK" | grep -E "(index\.html|sidecar|assets/)" | head -20

      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: Moscad-Stealth-APK
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: verify APK contents after build
        run: |
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK_PATH"
          echo "=== Size ==="
          ls -lh "$APK_PATH"
          echo "=== Key files ==="
          unzip -l "$APK_PATH" | grep -E "(\.so|sidecar|index\.html|assets/)" | head -20
